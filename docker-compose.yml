version: "3.8"

services:
  api:
    build: ./api
    container_name: medchat_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - qdrant
      - vllm
    networks:
      - medchat

  vllm:
    image: ghcr.io/vllm-project/vllm:latest
    container_name: medchat_vllm
    restart: unless-stopped
    environment:
      - MODEL=/model/merged_model
    command: >
      python -m vllm.entrypoints.openai.api_server
      --model /model/merged_model
      --host 0.0.0.0
      --port 8000
    volumes:
      - ./merged_model:/model/merged_model:ro
    ports:
      - "8000:8000"
    networks:
      - medchat

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medchat_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - medchat

  redis:
    image: redis:7-alpine
    container_name: medchat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medchat

  postgres:
    image: postgres:15-alpine
    container_name: medchat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meduser
      POSTGRES_PASSWORD: medpass
      POSTGRES_DB: medchat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medchat

  prometheus:
    image: prom/prometheus:latest
    container_name: medchat_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - medchat

  grafana:
    image: grafana/grafana:latest
    container_name: medchat_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/dashboard.json:/var/lib/grafana/dashboards/medical_chat.json:ro
    depends_on:
      - prometheus
    networks:
      - medchat
    # Provision grafana dashboard via provisioning config (optional, omitted for brevity)

  frontend:
    image: nginx:alpine
    container_name: medchat_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - medchat

networks:
  medchat:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data:
  grafana_data:
