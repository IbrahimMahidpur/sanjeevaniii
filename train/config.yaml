model_name: mistralai/Mistral-7B-Instruct-v0.3
output_dir: ./checkpoints
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj
bits: 4
bf16: true
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-4
num_train_epochs: 3
warmup_ratio: 0.03
logging_steps: 10
save_steps: 100
eval_steps: 100
max_seq_length: 2048